name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      # The cargo fmt / clippy / test hooks run the system toolchain, so install
      # Rust (stable) with the rustfmt and clippy components. Tracking stable
      # means a newer clippy may introduce new lints; fix them as they appear.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Cache the pre-commit hook environments, keyed on the config so a hook
      # version bump invalidates the cache.
      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # Commit messages are checked with the commitlint action (it sees every
      # commit in the PR); the matching commit-msg hook covers local commits.
      - name: Commitlint
        if: github.event_name == 'pull_request'
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yaml
          failOnWarnings: true

      # Run the repository's own pre-commit hooks so CI and local pre-commit run
      # the exact same checks (file hygiene, prettier, markdownlint, cargo fmt,
      # clippy, and tests) from the single .pre-commit-config.yaml and cannot
      # drift apart. (The commit-msg commitlint hook is handled by the step
      # above; pre-commit run --all-files does not invoke commit-msg hooks.)
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
